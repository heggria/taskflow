# pnpm workspace — nine packages under packages/ + website.
# (Replaces the npm `workspaces` field in the root package.json; pnpm ignores
# that field and requires this file instead.)
packages:
  - "packages/taskflow-core"
  - "packages/taskflow-mcp-core"
  - "packages/taskflow-hosts"
  - "packages/pi-taskflow"
  - "packages/codex-taskflow"
  - "packages/claude-taskflow"
  - "packages/opencode-taskflow"
  - "packages/grok-taskflow"
  - "packages/taskflow-dsl"
  - "website"
