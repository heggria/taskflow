name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege by default; jobs opt into more if they need it.
permissions:
  contents: read

jobs:
  process-supervisor:
    name: process supervisor (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/
      - name: Shared completion and process-tree tests
        run: node --conditions=development --experimental-strip-types --test packages/taskflow-core/test/runner-process.test.ts

  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # pnpm via corepack — the version is pinned by the `packageManager` field
      # in package.json, so every contributor and CI run use the same pnpm.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: ${{ matrix.node }}
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

  e2e:
    name: e2e (codex MCP, network-free)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/

      # server.ts imports `taskflow-core` by package name, which resolves to
      # node_modules/taskflow-core/dist — so the workspace dist must exist first.
      - name: Build all packages
        run: pnpm run build

      # The codex MCP e2e spawns the real bin over stdio and drives the full
      # handshake + tool calls — no live model / no network. The other e2e
      # (test:e2e-codex) needs a live codex session, so it stays manual.
      - name: Codex MCP e2e (stdio handshake + tool calls)
        run: pnpm run test:e2e-codex-mcp

      # Comprehensive rendering/validation E2E against the built dist bin:
      # malformed-input safety, false-pass guards, SVG injection escaping.
      # rsvg rasterization is optional (auto-skipped when absent).
      - name: Codex MCP e2e (comprehensive rendering)
        run: pnpm run test:e2e-codex-mcp-full

      # The claude MCP e2e likewise spawns the real bin over stdio and drives the
      # full handshake + tool calls with no live model / no network. (The
      # executor e2e test:e2e-claude needs a live claude session, so it stays
      # manual.)
      - name: Claude MCP e2e (stdio handshake + tool calls)
        run: pnpm run test:e2e-claude-mcp

      # The opencode MCP e2e likewise spawns the real bin over stdio and drives
      # the full handshake + tool calls with no live model / no network. (The
      # executor e2e test:e2e-opencode needs a live opencode session, so it
      # stays manual.)
      - name: OpenCode MCP e2e (stdio handshake + tool calls)
        run: pnpm run test:e2e-opencode-mcp

      # Grok MCP e2e is also stdio-only and does not require a live Grok model.
      - name: Grok MCP e2e (stdio handshake + tool calls)
        run: pnpm run test:e2e-grok-mcp

  build:
    name: build (dist emit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/

      # Published packages ship compiled dist/. Proving the build emits on every
      # PR catches type-strip-only breakages that `tsc --noEmit` can miss.
      - name: Build all packages
        run: pnpm run build

  packed-consumer:
    name: packed consumer (9 packages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/

      # Pack with pnpm so workspace:* is rewritten exactly as it will be for
      # publish. Install only those tarballs into a clean npm project, then
      # exercise every explicit export and shipped bin.
      - name: Build, pack, install, and smoke test all published packages
        run: pnpm run test:pack

  website:
    name: website (production export)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # The docs source records last-modified timestamps from git history.
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --registry https://registry.npmjs.org/

      # Match the GitHub Pages deployment settings so base-path-only failures
      # are caught before merge. `build` runs docs:check before the export.
      - name: Validate docs and build production export
        working-directory: website
        run: pnpm run build
        env:
          TASKFLOW_BASE_PATH: /taskflow

  codeql:
    name: CodeQL (JS/TS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
