name: Deploy Website

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - 'README.md'
      - 'README.zh-CN.md'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the lastModified remark plugin can read accurate
          # git timestamps for every docs page (shallow clone would leave
          # most pages without a last-updated date).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci --ignore-scripts

      - name: Generate MDX source
        working-directory: website
        run: npm run prepare-source

      - name: Build
        working-directory: website
        run: npm run build
        env:
          TASKFLOW_BASE_PATH: /taskflow

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
