name: Publish & Release

# Publishes taskflow-core + pi-taskflow + codex-taskflow to npmjs.com and
# creates a GitHub Release, when a v* tag is pushed (e.g. `git tag v0.1.0 &&
# git push origin v0.1.0`). All three workspace versions must equal the tag.

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub Release
      id-token: write    # npm provenance

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --registry https://registry.npmjs.org/

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build all packages (emit dist)
        run: npm run build

      - name: Verify tag matches workspace versions
        run: |
          TAG="${GITHUB_REF_NAME}"
          EXPECT="v$(node -p "require('./package.json').version")"
          if [ "$EXPECT" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match root version $EXPECT"
            exit 1
          fi
          for pkg in taskflow-core pi-taskflow codex-taskflow; do
            V="v$(node -p "require('./packages/$pkg/package.json').version")"
            if [ "$V" != "$TAG" ]; then
              echo "::error::Tag $TAG does not match $pkg version $V"
              exit 1
            fi
          done
          # The Codex plugin pins the exact MCP package version it launches
          # (codex-taskflow@X.Y.Z in .mcp.json) so the plugin version binds the
          # executed code. That pin must equal the release tag.
          PLUGIN_V="v$(node -p "require('./packages/codex-taskflow/plugin/.codex-plugin/plugin.json').version")"
          if [ "$PLUGIN_V" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match plugin.json version $PLUGIN_V"
            exit 1
          fi
          PINNED="v$(node -p "require('./packages/codex-taskflow/plugin/.mcp.json').mcpServers.taskflow.args.find(a => a.startsWith('codex-taskflow@')).split('@')[1]")"
          if [ "$PINNED" != "$TAG" ]; then
            echo "::error::.mcp.json pins codex-taskflow@${PINNED#v} but tag is $TAG"
            exit 1
          fi

      - name: Publish workspaces to npmjs.com
        # Order matters: taskflow-core first (the adapters depend on it).
        # Idempotent: if this exact version is already on npm (e.g. a re-run or a
        # partial earlier publish), skip that package instead of failing the job.
        run: |
          set -e
          publish_one() {
            local pkg="$1"
            local name version
            name="$(node -p "require('./packages/$pkg/package.json').name")"
            version="$(node -p "require('./packages/$pkg/package.json').version")"
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "::notice::$name@$version already published — skipping"
            else
              echo "Publishing $name@$version"
              npm publish -w "$pkg" --provenance --access public
            fi
          }
          publish_one taskflow-core
          publish_one pi-taskflow
          publish_one codex-taskflow
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            let body = [];
            try {
              const content = fs.readFileSync('CHANGELOG.md', 'utf-8');
              const lines = content.split('\n');
              let capturing = false;
              for (const line of lines) {
                if (line.startsWith('## [' + process.argv[1] + ']')) { capturing = true; }
                else if (capturing && line.startsWith('## [')) { break; }
                if (capturing) body.push(line);
              }
            } catch {}
            const text = body.join('\n').trim();
            fs.writeFileSync('/tmp/release-notes.md', text || ('Release ' + process.argv[1] + ' \u2014 taskflow-core, pi-taskflow, codex-taskflow.'));
          " "$VERSION"
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "v$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
