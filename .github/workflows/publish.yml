name: Publish & Release

# Publishes to npmjs.com and creates a GitHub Release,
# when a v* tag is pushed (e.g. `git tag v0.0.16 && git push --tags`).

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub Release
      id-token: write    # npm provenance

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm install --registry https://registry.npmjs.org/

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Publish to npmjs.com
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('CHANGELOG.md', 'utf-8');
            const lines = content.split('\n');
            let capturing = false, body = [];
            for (const line of lines) {
              if (line.startsWith('## [' + process.argv[1] + ']')) { capturing = true; }
              else if (capturing && line.startsWith('## [')) { break; }
              if (capturing) body.push(line);
            }
            fs.writeFileSync('/tmp/release-notes.md', body.join('\n').trim());
          " "$VERSION"
          gh release create "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            --title "pi-taskflow $VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
