<svg width="1000" height="430" viewBox="0 0 1000 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="work 是一段流动的命令式脚本，它的图藏在控制流里、运行前无法验证；taskflow 是一张由离散任务节点构成的声明式图，在花掉任何 token 之前就被静态验证">
  <defs>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1B1D29" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1000" height="430" rx="22" fill="#F7F6F3"/>
  <rect x="0.5" y="0.5" width="999" height="429" rx="21.5" stroke="#E5E3DD"/>

  <!-- divider -->
  <line x1="500" y1="36" x2="500" y2="352" stroke="#E5E3DD" stroke-dasharray="4 5"/>

  <!-- ============ LEFT: a workflow runs "work" ============ -->
  <text x="60" y="58" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="11" letter-spacing="1.6" fill="#A6A9AE">一段流动的脚本</text>
  <text x="60" y="92" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#17181C">work</text>

  <!-- code card -->
  <g filter="url(#card)"><rect x="60" y="110" width="380" height="158" rx="12" fill="#FFFFFF" stroke="#E5E3DD"/></g>
  <circle cx="80" cy="130" r="3.5" fill="#E8E6E1"/><circle cx="93" cy="130" r="3.5" fill="#E8E6E1"/><circle cx="106" cy="130" r="3.5" fill="#E8E6E1"/>
  <line x1="60" y1="144" x2="440" y2="144" stroke="#EFEEE9"/>
  <g font-family="'SF Mono',Menlo,monospace" font-size="12" fill="#3C3F45">
    <text x="80" y="168"><tspan fill="#A6A9AE">// 模型写 JS，然后直接运行</tspan></text>
    <text x="80" y="190"><tspan fill="#4B4ACF">const</tspan> f = <tspan fill="#4B4ACF">await</tspan> agent(<tspan fill="#B07E1E">'list files'</tspan>)</text>
    <text x="80" y="212"><tspan fill="#4B4ACF">for</tspan> (<tspan fill="#4B4ACF">const</tspan> x <tspan fill="#4B4ACF">of</tspan> JSON.parse(f)) {</text>
    <text x="80" y="234">  <tspan fill="#4B4ACF">await</tspan> agent(<tspan fill="#B07E1E">`audit ${x}`</tspan>)  <tspan fill="#A6A9AE">// }</tspan></text>
    <text x="80" y="256"><tspan fill="#A6A9AE">// 图藏在控制流里</tspan></text>
  </g>

  <!-- verdict strip -->
  <rect x="60" y="288" width="380" height="60" rx="12" fill="#FBF1F0" stroke="#EDD2CE"/>
  <circle cx="88" cy="318" r="10" fill="#FFFFFF" stroke="#D96C5F" stroke-width="1.5"/>
  <path d="M84 314 l8 8 M92 314 l-8 8" stroke="#C4473A" stroke-width="2" stroke-linecap="round"/>
  <text x="108" y="313" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="13.5" font-weight="600" fill="#A63A2E">运行前无法验证</text>
  <text x="108" y="333" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10.5" fill="#B4766D">图灵完备 · 循环次数只有运行时才知道</text>

  <!-- ============ RIGHT: a taskflow declares it ============ -->
  <text x="560" y="58" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="11" letter-spacing="1.6" fill="#A6A9AE">一张任务图</text>
  <text x="560" y="92" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#4B4ACF">taskflow</text>

  <!-- graph card -->
  <g filter="url(#card)"><rect x="560" y="110" width="380" height="158" rx="12" fill="#FFFFFF" stroke="#E5E3DD"/></g>

  <!-- edges -->
  <g stroke="#B9B8EC" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M660 189 C682 189, 686 151, 708 151"/>
    <path d="M660 189 H708"/>
    <path d="M660 189 C682 189, 686 227, 708 227"/>
    <path d="M796 151 C820 151, 824 189, 844 189"/>
    <path d="M796 189 H844"/>
    <path d="M796 227 C820 227, 824 189, 844 189"/>
  </g>
  <g fill="#8B8AE3"><path d="M708 151 l-8 -4.5 v9 z"/><path d="M708 189 l-8 -4.5 v9 z"/><path d="M708 227 l-8 -4.5 v9 z"/></g>
  <path d="M844 189 l-8 -4.5 v9 z" fill="#B07E1E"/>

  <!-- nodes -->
  <rect x="588" y="168" width="72" height="42" rx="10" fill="#FFFFFF" stroke="#DBDAF4"/>
  <text x="624" y="187" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="11.5" font-weight="700" fill="#17181C">scan</text>
  <text x="624" y="201" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#8E9199">agent</text>

  <g>
    <rect x="710" y="133" width="86" height="36" rx="9" fill="#FFFFFF" stroke="#DBDAF4"/>
    <rect x="710" y="171" width="86" height="36" rx="9" fill="#FFFFFF" stroke="#DBDAF4"/>
    <rect x="710" y="209" width="86" height="36" rx="9" fill="#FFFFFF" stroke="#DBDAF4"/>
  </g>
  <g font-family="'SF Mono',Menlo,monospace" font-size="11" font-weight="700" fill="#17181C" text-anchor="middle">
    <text x="753" y="155">audit·a</text>
    <text x="753" y="193">audit·b</text>
    <text x="753" y="231">audit·c</text>
  </g>

  <rect x="846" y="167" width="66" height="44" rx="10" fill="#FAF3E2" stroke="#E6D3A4"/>
  <text x="879" y="186" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="11.5" font-weight="700" fill="#17181C">gate</text>
  <text x="879" y="201" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="8" fill="#A87A18">PASS?</text>

  <!-- verdict strip -->
  <rect x="560" y="288" width="380" height="60" rx="12" fill="#E7F4EF" stroke="#BFE0D2"/>
  <circle cx="588" cy="318" r="10" fill="#FFFFFF" stroke="#0E8A66" stroke-width="1.5"/>
  <path d="M583 318 l4 4 l8 -8" stroke="#0E8A66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="608" y="313" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="13.5" font-weight="600" fill="#0A6E52">花任何 token 之前就已静态验证</text>
  <text x="608" y="333" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10.5" fill="#4F8A75">无环 · 预算 · 死路 —— 全部检查</text>

  <!-- bottom line -->
  <text x="500" y="398" text-anchor="middle" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="14" fill="#5A5D63"><tspan font-weight="600" fill="#17181C">workflow</tspan> 运行你的工作；<tspan font-weight="600" fill="#4B4ACF">taskflow</tspan> 把它声明成一张可检查、可视化、可保存、可重放的图。</text>
</svg>
