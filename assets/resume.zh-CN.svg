<svg width="1000" height="280" viewBox="0 0 1000 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="跨会话恢复：一个运行在会话 1 中途失败；状态持久化在磁盘；在会话 2 中 /tf resume 跳过已缓存的阶段，只重新运行失败的阶段及其后续">
  <defs>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1B1D29" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1000" height="280" rx="18" fill="#F7F6F3"/>
  <rect x="0.5" y="0.5" width="999" height="279" rx="17.5" stroke="#E5E3DD"/>

  <!-- ============ SESSION 1 ============ -->
  <text x="60" y="46" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10" letter-spacing="1.6" fill="#A6A9AE">会话 1</text>
  <text x="148" y="46" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="12" fill="#75787E">运行开始，中途失败</text>

  <g filter="url(#card)">
    <rect x="60" y="60" width="118" height="48" rx="11" fill="#FFFFFF" stroke="#BFE0D2"/>
    <rect x="218" y="60" width="118" height="48" rx="11" fill="#FFFFFF" stroke="#BFE0D2"/>
    <rect x="376" y="60" width="118" height="48" rx="11" fill="#FBF1F0" stroke="#E0A9A1"/>
    <rect x="534" y="60" width="118" height="48" rx="11" fill="#FFFFFF" stroke="#E5E3DD"/>
  </g>
  <g font-family="'SF Mono',Menlo,monospace" font-size="12.5" font-weight="700">
    <text x="76" y="81" fill="#17181C">discover</text>
    <text x="234" y="81" fill="#17181C">analyze</text>
    <text x="392" y="81" fill="#17181C">build</text>
    <text x="550" y="81" fill="#A6A9AE">report</text>
  </g>
  <g font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9">
    <text x="76" y="97" fill="#0E8A66">✓ 完成</text>
    <text x="234" y="97" fill="#0E8A66">✓ 完成</text>
    <text x="392" y="97" fill="#C4473A">✗ 失败</text>
    <text x="550" y="97" fill="#A6A9AE">○ 待运行</text>
  </g>
  <g stroke="#C9CBD1" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M178 84 H210"/><path d="M336 84 H368"/><path d="M494 84 H526"/>
  </g>
  <g fill="#C9CBD1"><path d="M216 84 l-9 -5 v10 z"/><path d="M374 84 l-9 -5 v10 z"/><path d="M532 84 l-9 -5 v10 z"/></g>

  <!-- state on disk -->
  <text x="694" y="88" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="12" fill="#75787E">状态在磁盘 →</text>
  <g filter="url(#card)"><rect x="806" y="67" width="134" height="34" rx="9" fill="#FFFFFF" stroke="#E5E3DD"/></g>
  <text x="873" y="88" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="10.5" fill="#5A5D63">runs/&lt;id&gt;.json</text>

  <!-- ============ RESUME DIVIDER ============ -->
  <line x1="60" y1="140" x2="376" y2="140" stroke="#E5E3DD"/>
  <line x1="624" y1="140" x2="940" y2="140" stroke="#E5E3DD"/>
  <rect x="392" y="126" width="216" height="28" rx="14" fill="#EEEEFB" stroke="#D9D8F5"/>
  <text x="500" y="144" text-anchor="middle" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="11" font-weight="700" fill="#4B4ACF">/tf resume · 几天之后</text>

  <!-- ============ SESSION 2 ============ -->
  <text x="60" y="186" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10" letter-spacing="1.6" fill="#A6A9AE">会话 2</text>
  <text x="148" y="186" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="12" fill="#75787E">已缓存的阶段跳过，只跑剩下的</text>

  <g>
    <rect x="60" y="200" width="118" height="48" rx="11" fill="#F1F0EC" stroke="#D9D7D0" stroke-dasharray="4 4"/>
    <rect x="218" y="200" width="118" height="48" rx="11" fill="#F1F0EC" stroke="#D9D7D0" stroke-dasharray="4 4"/>
  </g>
  <g filter="url(#card)">
    <rect x="376" y="200" width="118" height="48" rx="11" fill="#EEEEFB" stroke="#8B8AE3"/>
    <rect x="534" y="200" width="118" height="48" rx="11" fill="#FFFFFF" stroke="#0E8A66" stroke-width="1.4"/>
  </g>
  <g font-family="'SF Mono',Menlo,monospace" font-size="12.5" font-weight="700">
    <text x="76" y="221" fill="#8E9199">discover</text>
    <text x="234" y="221" fill="#8E9199">analyze</text>
    <text x="392" y="221" fill="#17181C">build</text>
    <text x="550" y="221" fill="#17181C">report</text>
  </g>
  <g font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9">
    <text x="76" y="237" fill="#A6A9AE">⟳ 缓存 · 跳过</text>
    <text x="234" y="237" fill="#A6A9AE">⟳ 缓存 · 跳过</text>
    <text x="392" y="237" fill="#4B4ACF">◐ 重新运行</text>
    <text x="550" y="237" fill="#0E8A66">▷ 运行</text>
  </g>
  <g stroke="#C9CBD1" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M178 224 H210"/><path d="M336 224 H368"/><path d="M494 224 H526"/>
  </g>
  <g fill="#C9CBD1"><path d="M216 224 l-9 -5 v10 z"/><path d="M374 224 l-9 -5 v10 z"/><path d="M532 224 l-9 -5 v10 z"/></g>

  <!-- outcome -->
  <rect x="806" y="207" width="134" height="34" rx="17" fill="#E7F4EF" stroke="#BFE0D2"/>
  <text x="873" y="228" text-anchor="middle" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10.5" font-weight="700" fill="#0A6E52">零浪费</text>
</svg>
