<svg width="1000" height="300" viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="上下文隔离：使用原生子代理时每个转录都涌入你的上下文；使用 taskflow 时转录留在运行时，只有最终结果返回">
  <defs>
    <filter id="card" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1B1D29" flood-opacity="0.05"/>
    </filter>
  </defs>

  <rect width="1000" height="300" rx="18" fill="#F7F6F3"/>
  <rect x="0.5" y="0.5" width="999" height="299" rx="17.5" stroke="#E5E3DD"/>

  <!-- divider -->
  <line x1="500" y1="30" x2="500" y2="270" stroke="#E5E3DD" stroke-dasharray="4 5"/>

  <!-- ============ LEFT: raw subagents ============ -->
  <text x="60" y="48" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10" letter-spacing="1.6" fill="#A6A9AE">原生子代理</text>
  <text x="60" y="72" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="15" font-weight="600" fill="#A63A2E">每个转录都落进你的上下文</text>

  <!-- your context card (cluttered) -->
  <g filter="url(#card)"><rect x="60" y="88" width="380" height="176" rx="12" fill="#FFFFFF" stroke="#EDD2CE"/></g>
  <path d="M72 88.5 h356 a11.5 11.5 0 0 1 11.5 11.5 v14 h-379 v-14 a11.5 11.5 0 0 1 11.5 -11.5 z" fill="#FBF1F0"/>
  <text x="76" y="105.5" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9.5" letter-spacing="0.8" fill="#A63A2E">你的上下文 · 40k tokens</text>
  <g font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10" fill="#75787E">
    <rect x="76" y="122" width="348" height="17" rx="5" fill="#F6F1EE"/><text x="86" y="134">▸ 子代理 1 转录 … 6.6k tokens</text>
    <rect x="76" y="143" width="348" height="17" rx="5" fill="#F6F1EE"/><text x="86" y="155">▸ 子代理 2 转录 … 4.1k tokens</text>
    <rect x="76" y="164" width="348" height="17" rx="5" fill="#F6F1EE"/><text x="86" y="176">▸ 子代理 3 转录 … 9.2k tokens</text>
    <rect x="76" y="185" width="348" height="17" rx="5" fill="#F6F1EE"/><text x="86" y="197">▸ 工具调用、重试、死胡同 …</text>
    <rect x="76" y="206" width="348" height="17" rx="5" fill="#F6F1EE"/><text x="86" y="218">▸ … 还有 20k tokens 的噪音</text>
    <rect x="76" y="227" width="348" height="17" rx="5" fill="#FBF1F0"/><text x="86" y="239" fill="#A63A2E">✓ 答案（被埋住了）</text>
  </g>

  <!-- ============ RIGHT: taskflow ============ -->
  <text x="560" y="48" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="10" letter-spacing="1.6" fill="#A6A9AE">TASKFLOW</text>
  <text x="560" y="72" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="15" font-weight="600" fill="#4B4ACF">转录留在运行时</text>

  <!-- runtime sandbox -->
  <rect x="560" y="88" width="196" height="176" rx="12" fill="#FBFAF8" stroke="#C9C8EF" stroke-dasharray="6 5"/>
  <text x="576" y="110" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9.5" letter-spacing="0.8" fill="#4B4ACF">运行时</text>
  <g font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9.5" fill="#8E9199">
    <rect x="576" y="120" width="164" height="16" rx="5" fill="#EEEEFB"/><text x="584" y="131.5">转录 · 6.6k</text>
    <rect x="576" y="140" width="164" height="16" rx="5" fill="#EEEEFB"/><text x="584" y="151.5">转录 · 4.1k</text>
    <rect x="576" y="160" width="164" height="16" rx="5" fill="#EEEEFB"/><text x="584" y="171.5">转录 · 9.2k</text>
    <rect x="576" y="180" width="164" height="16" rx="5" fill="#EEEEFB"/><text x="584" y="191.5">重试 · 死胡同</text>
    <rect x="576" y="200" width="164" height="16" rx="5" fill="#EEEEFB"/><text x="584" y="211.5">… 全部留在这里</text>
  </g>
  <text x="658" y="244" text-anchor="middle" font-family="'PingFang SC','Hiragino Sans GB',sans-serif" font-size="10.5" fill="#8E9199">40k tokens，全部关在里面</text>

  <!-- arrow: only the result crosses -->
  <path d="M762 176 H798" stroke="#0E8A66" stroke-width="3" stroke-linecap="round"/>
  <path d="M806 176 l-11 -6 v12 z" fill="#0E8A66"/>
  <text x="783" y="162" text-anchor="middle" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9" fill="#0E8A66">结果</text>

  <!-- your context (clean) -->
  <g filter="url(#card)"><rect x="812" y="118" width="128" height="116" rx="12" fill="#FFFFFF" stroke="#BFE0D2"/></g>
  <path d="M824 118.5 h104 a11.5 11.5 0 0 1 11.5 11.5 v14 h-127 v-14 a11.5 11.5 0 0 1 11.5 -11.5 z" fill="#E7F4EF"/>
  <text x="828" y="135.5" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="9.5" letter-spacing="0.8" fill="#0A6E52">你的上下文</text>
  <g filter="url(#card)"><rect x="828" y="156" width="96" height="52" rx="10" fill="#FFFFFF" stroke="#0E8A66" stroke-width="1.4"/></g>
  <text x="876" y="179" text-anchor="middle" font-family="'SF Mono',Menlo,monospace" font-size="12" font-weight="700" fill="#17181C">report</text>
  <text x="876" y="196" text-anchor="middle" font-family="'SF Mono',Menlo,'PingFang SC',monospace" font-size="8.5" fill="#0E8A66">只有答案</text>
</svg>
